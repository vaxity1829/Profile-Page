<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaxity // Discord Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Press+Start+2P&display=swap');

        :root {
            --bg-deep: #0b0b0b;
            --bg-card: #111214;
            --bg-inner: #232428;
            --text-header: #ffffff;
            --text-normal: #dbdee1;
            --text-muted: #b5bac1;
            --status-online: #23a55a;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-normal);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            gap: 40px;
            padding: 20px;
            overflow: hidden;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 280px;
        }

        .panel-box {
            background-color: var(--bg-card);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .panel-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-header);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 10px 12px 0;
        }

        #visualizer-canvas {
            width: 100%;
            height: 200px;
            display: block;
        }

        #badapple-canvas {
            width: 100%;
            height: 220px;
            display: block;
            image-rendering: pixelated;
        }

        .clock-box {
            text-align: center;
            padding: 16px;
        }

        .clock-time {
            font-family: 'Press Start 2P', monospace;
            font-size: 28px;
            color: #ff3333;
            text-shadow: 0 0 10px rgba(255,51,51,0.5);
            letter-spacing: 2px;
        }

        .clock-date {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: #cc2222;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        .clock-seconds {
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            color: #5c0e10;
            margin-top: 4px;
        }

        .profile-container {
            width: 340px;
            background-color: var(--bg-card);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        .banner { height: 105px; background-color: #5c0e10; }

        .avatar-outer {
            position: absolute;
            top: 60px;
            left: 16px;
            width: 92px;
            height: 92px;
            background-color: var(--bg-card);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        .avatar-inner {
            position: relative;
            width: 80px;
            height: 80px;
        }

        .pfp {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .avatar-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 140px;
            pointer-events: none;
            z-index: 6;
            object-fit: contain;
        }

        .status-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 20px;
            height: 20px;
            background-color: var(--status-online);
            border: 4px solid var(--bg-card);
            border-radius: 50%;
            z-index: 7;
        }

        .badges-area {
            position: absolute;
            top: 115px;
            right: 16px;
            display: flex;
            gap: 4px;
            padding: 4px;
            background: rgba(0,0,0,0.4);
            border-radius: 4px;
        }

        .badge { width: 20px; height: 20px; cursor: pointer; transition: transform 0.2s; }
        .badge:hover { transform: scale(1.3); }
        .badges-area .badge:nth-child(2) { width: 17px; height: 17px; align-self: center; }

        .profile-body { padding: 56px 16px 16px; }
        .user-header { margin-bottom: 16px; }

        .display-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-header);
        }

        .username-tag {
            font-size: 14px;
            color: var(--text-normal);
        }

        .tabs {
            display: flex;
            gap: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 12px;
        }

        .tab {
            padding-bottom: 12px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
        }
        .tab:hover {
            color: var(--text-header);
            transform: translateY(-2px);
        }

        .tab.active {
            color: var(--text-header);
            border-bottom: 2px solid var(--text-header);
        }

        .tab-content-wrapper {
            position: relative;
            overflow: hidden;
            min-height: 150px;
        }

        .tab-content {
            position: absolute;
            width: 100%;
            transition: transform 0.3s ease, opacity 0.3s ease;
            opacity: 0;
            transform: translateX(100%);
        }

        .tab-content.active {
            opacity: 1;
            transform: translateX(0);
            position: relative;
        }

        .tab-content.slide-out-left {
            transform: translateX(-100%);
            opacity: 0;
        }

        .tab-content.slide-out-right {
            transform: translateX(100%);
            opacity: 0;
        }

        .inner-section {
            background-color: var(--bg-inner);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-header);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.02em;
        }

        .bio-content {
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-normal);
        }

        .member-since {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--text-normal);
            margin-top: 12px;
        }

        .discord-svg { color: #b5bac1; }

        .note-input {
            font-size: 12px;
            color: var(--text-muted);
            font-style: italic;
            cursor: pointer;
            transition: color 0.2s, background-color 0.2s;
            padding: 8px;
            border-radius: 4px;
        }
        .note-input:hover {
            color: var(--text-normal);
            background-color: rgba(255,255,255,0.04);
        }
        .note-input input {
            background: transparent;
            border: none;
            color: var(--text-normal);
            font-size: 12px;
            font-family: inherit;
            width: 100%;
            outline: none;
            cursor: none;
        }
        .note-input input::placeholder {
            color: var(--text-muted);
            font-style: italic;
        }
            #cursor-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
        }

        * { cursor: none !important; }
        *:hover { cursor: none !important; }
        button, a, input, textarea, select, [role="button"] { cursor: none !important; }

        .top-menu {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }

        .top-menu a {
            color: var(--text-header);
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            background: rgba(17, 18, 20, 0.9);
            padding: 10px 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .top-menu a:hover {
            background: rgba(35, 36, 40, 0.95);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .top-menu .arrow {
            font-size: 12px;
            transition: transform 0.2s ease;
            display: inline-block;
        }

        .top-menu .arrow.active {
            transform: rotate(180deg);
        }

        .menu-trigger {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        ::selection {
            background: rgba(220, 38, 38, 0.5);
            color: white;
        }

        ::-moz-selection {
            background: rgba(220, 38, 38, 0.5);
            color: white;
        }

        .dropdown-menu {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            background: rgba(17, 18, 20, 0.95);
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 16px;
            min-width: 220px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.2s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .dropdown-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .roblox-icon-inline {
            width: 18px;
            height: 18px;
            color: var(--text-header);
            flex-shrink: 0;
            border-radius: 4px;
            object-fit: cover;
        }

        .profile-link {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text-header);
            padding: 8px;
            border-radius: 6px;
            transition: background 0.2s ease;
        }

        .profile-link:hover {
            background: rgba(255,255,255,0.05);
        }

        .username-container {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
        }

        .roblox-username {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-header);
        }

        .verified-badge {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .verified-badge svg {
            width: 100%;
            height: 100%;
        }

        .external-icon {
            width: 14px;
            height: 14px;
            opacity: 0.5;
            transition: opacity 0.2s ease;
        }

        .profile-link:hover .external-icon {
            opacity: 1;
        }
    </style>
</head>

    <script>
        const canvas = document.getElementById('cursor-canvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();

        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        const trail = [];
        const maxTrailLength = 25;
        const colors = ['#ff3333', '#cc2222', '#5c0e10'];
        let isHovering = false;
        let hoverAnim = 0;
        let hoverTarget = 0;
        let cursorVisible = true;
        let isHoveringPong = false;
        let trailFade = 1;
        let lastCursorX = window.innerWidth / 2;
        let lastCursorY = window.innerHeight / 2;

        let prevMouseX = window.innerWidth / 2;
        let prevMouseY = window.innerHeight / 2;
        let mouseVX = 0;
        let mouseVY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        document.addEventListener('mouseleave', () => {
            cursorVisible = false;
            lastCursorX = mouseX;
            lastCursorY = mouseY;
        });

        document.addEventListener('mouseenter', (e) => {
            cursorVisible = true;
            trailFade = 1;
            mouseX = e.clientX;
            mouseY = e.clientY;
            // Trail starts fresh from entry point
            for (let i = 0; i < trail.length; i++) {
                trail[i].x = mouseX;
                trail[i].y = mouseY;
            }
            prevMouseX = mouseX;
            prevMouseY = mouseY;
        });

        const interactives = document.querySelectorAll('.tab, .note-input, .badge, .avatar-inner, .pfp');
        interactives.forEach(el => {
            el.addEventListener('mouseenter', () => { hoverTarget = 1; });
            el.addEventListener('mouseleave', () => { hoverTarget = 0; });
        });

        window.addEventListener('resize', resizeCanvas);

        function drawFluidTrail() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            mouseVX = mouseX - prevMouseX;
            mouseVY = mouseY - prevMouseY;
            prevMouseX = mouseX;
            prevMouseY = mouseY;

            if (trail.length === 0) {
                for (let i = 0; i < maxTrailLength; i++) {
                    trail.push({ x: mouseX, y: mouseY });
                }
            }

            trail[0].x = mouseX;
            trail[0].y = mouseY;

            for (let i = 1; i < trail.length; i++) {
                const prev = trail[i - 1];
                const point = trail[i];

                const lerp = 0.55;
                point.x += (prev.x - point.x) * lerp;
                point.y += (prev.y - point.y) * lerp;
            }

            if (trail.length < 2) {
                requestAnimationFrame(drawFluidTrail);
                return;
            }

            // Hide cursor when hovering over Pong
            const shouldShowCursor = cursorVisible && !isHoveringPong;

            // Fade trail in/out smoothly
            if (shouldShowCursor) {
                trailFade = Math.min(1, trailFade + 0.08);
            } else {
                trailFade = Math.max(0, trailFade - 0.03);
            }

            // Continue trail physics even when fading out
            if (trailFade > 0) {
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                for (let i = trail.length - 2; i >= 0; i--) {
                    const t = i / (trail.length - 1);
                    const point = trail[i];
                    const next = trail[i + 1];

                    const size = 28;
                    const colorIndex = Math.min(Math.floor(t * colors.length), colors.length - 1);
                    const color = colors[colorIndex];
                    const alpha = trailFade * (0.3 + t * 0.7); // Fade trail tip first

                    ctx.globalAlpha = alpha;

                    if (i > 0) {
                        const prev = trail[i - 1];

                        ctx.beginPath();
                        ctx.moveTo(prev.x, prev.y);
                        ctx.quadraticCurveTo(point.x, point.y, next.x, next.y);
                        ctx.strokeStyle = color;
                        ctx.lineWidth = size;
                        ctx.stroke();
                    } else {
                        ctx.beginPath();
                        ctx.moveTo(point.x, point.y);
                        ctx.lineTo(next.x, next.y);
                        ctx.strokeStyle = color;
                        ctx.lineWidth = size;
                        ctx.stroke();
                    }
                }
                ctx.globalAlpha = 1;
            }

            hoverAnim += (hoverTarget - hoverAnim) * 0.15;

            // Only show cursor dot when fully visible
            if (shouldShowCursor && trailFade > 0.5) {
                const cursorSize = 14 + hoverAnim * 10;
                const glowSize = 12 + hoverAnim * 20;

                if (hoverAnim > 0.1) {
                    ctx.beginPath();
                    ctx.arc(mouseX, mouseY, cursorSize + 8, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 51, 51, ' + (hoverAnim * 0.15) + ')';
                    ctx.fill();
                }

                ctx.beginPath();
                ctx.arc(mouseX, mouseY, cursorSize, 0, Math.PI * 2);
                ctx.fillStyle = '#ff3333';
                ctx.shadowColor = '#ff3333';
                ctx.shadowBlur = glowSize;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            requestAnimationFrame(drawFluidTrail);
        }
        
        drawFluidTrail();

        // === AUDIO VISUALIZER (Bad Apple!! pattern ~138 BPM) ===
        const vizCanvas = document.getElementById('visualizer-canvas');
        const vizCtx = vizCanvas.getContext('2d');
        const vizW = 280;
        const vizH = 200;
        vizCanvas.width = vizW;
        vizCanvas.height = vizH;

        const barCount = 32;
        const barValues = new Array(barCount).fill(0);
        const barTargets = new Array(barCount).fill(0);
        let vizTime = 0;
        const bpm = 138;
        const beatDur = 60 / bpm;

        function updateVisualizer() {
            vizTime += 1 / 60;
            const beat = vizTime / beatDur;
            const beatFrac = beat % 1;
            const measure = beat / 4;
            const measureFrac = measure % 1;

            // Kick on every beat
            const kick = Math.exp(-beatFrac * 12) * 0.9;
            // Snare on beats 2 and 4
            const snare = ((Math.floor(beat) % 2 === 1) ? Math.exp(-beatFrac * 18) * 0.7 : 0);
            // Hi-hat on every 8th note
            const hihatFrac = (beat * 2) % 1;
            const hihat = Math.exp(-hihatFrac * 25) * 0.4;
            // Bass synth - follows melody pattern
            const bassPhase = measure * Math.PI * 2;
            const bass = (Math.sin(bassPhase * 0.5) * 0.5 + 0.5) * Math.exp(-beatFrac * 4) * 0.6;
            // Lead synth - higher freq melody
            const leadPhase = measure * Math.PI * 3;
            const lead = (Math.sin(leadPhase) * 0.5 + 0.5) * (0.3 + Math.sin(measure * Math.PI * 1.5) * 0.2);
            // Pad - sustained background
            const pad = (Math.sin(measure * Math.PI * 0.25) * 0.3 + 0.35);

            for (let i = 0; i < barCount; i++) {
                const freq = i / barCount;
                let target = 0;

                // Sub-bass (bars 0-4)
                if (freq < 0.15) {
                    target += kick * (1 - freq * 5);
                }
                // Bass (bars 4-10)
                if (freq >= 0.1 && freq < 0.35) {
                    target += bass * (1 - Math.abs(freq - 0.2) * 4);
                }
                // Snare (bars 8-16)
                if (freq >= 0.25 && freq < 0.5) {
                    target += snare * (1 - Math.abs(freq - 0.35) * 3);
                }
                // Hi-hat (bars 16-28)
                if (freq >= 0.5 && freq < 0.9) {
                    target += hihat * (1 - (freq - 0.5) * 2);
                }
                // Lead synth (bars 12-24)
                if (freq >= 0.35 && freq < 0.75) {
                    const leadEnv = Math.sin((freq - 0.35) / 0.4 * Math.PI);
                    target += lead * leadEnv;
                }
                // Pad (bars 6-26)
                if (freq >= 0.15 && freq < 0.85) {
                    target += pad * 0.5;
                }

                // Add slight variation
                target += Math.sin(vizTime * 3 + i * 0.8) * 0.05;
                target += Math.sin(vizTime * 7 + i * 1.3) * 0.03;

                barTargets[i] = Math.max(0.02, Math.min(1, target));
                barValues[i] += (barTargets[i] - barValues[i]) * 0.22;
            }

            vizCtx.fillStyle = '#111214';
            vizCtx.fillRect(0, 0, vizW, vizH);

            const barW = (vizW - (barCount + 1) * 2) / barCount;
            for (let i = 0; i < barCount; i++) {
                const x = 2 + i * (barW + 2);
                const h = barValues[i] * (vizH - 20);
                const y = vizH - 10 - h;

                const grad = vizCtx.createLinearGradient(x, y, x, vizH - 10);
                grad.addColorStop(0, '#ff3333');
                grad.addColorStop(0.5, '#cc2222');
                grad.addColorStop(1, '#5c0e10');
                vizCtx.fillStyle = grad;
                vizCtx.fillRect(x, y, barW, h);

                vizCtx.fillStyle = 'rgba(255, 51, 51, 0.3)';
                vizCtx.fillRect(x, y - 3, barW, 2);
            }

            requestAnimationFrame(updateVisualizer);
        }
        updateVisualizer();

        // === CLOCK ===
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');

            document.getElementById('clock-time').textContent = h + ':' + m;
            document.getElementById('clock-seconds').textContent = ':' + s;
            document.getElementById('clock-date').textContent = year + '.' + month + '.' + day;

            requestAnimationFrame(updateClock);
        }
        updateClock();

        // === PIXELATED PONG ===
        const pongCanvas = document.getElementById('badapple-canvas');
        const pongCtx = pongCanvas.getContext('2d');
        const pongW = 48;
        const pongH = 36;
        pongCanvas.width = pongW;
        pongCanvas.height = pongH;

        // Game state
        let paddleL = { y: pongH / 2 - 4, h: 8, w: 2, x: 2 };
        let paddleR = { y: pongH / 2 - 4, h: 8, w: 2, x: pongW - 4 };
        let ball = { x: pongW / 2, y: pongH / 2, vx: 0.8, vy: 0.5, r: 1 };
        let scoreL = 0, scoreR = 0;
        let lastTime = performance.now();
        let keyUp = false;
        let keyDown = false;
        const paddleSpeed = 1.2;

        // AI state for natural movement
        let aiL = { targetY: pongH / 2, reactionDelay: 0, speedVar: 1 };
        let aiR = { targetY: pongH / 2, reactionDelay: 0, speedVar: 1 };

        // Hover detection
        pongCanvas.parentElement.addEventListener('mouseenter', () => { isHoveringPong = true; });
        pongCanvas.parentElement.addEventListener('mouseleave', () => { isHoveringPong = false; keyUp = false; keyDown = false; });

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!isHoveringPong) return;
            if (e.key === 'ArrowUp') keyUp = true;
            if (e.key === 'ArrowDown') keyDown = true;
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowUp') keyUp = false;
            if (e.key === 'ArrowDown') keyDown = false;
        });

        function resetBall(direction) {
            ball.x = pongW / 2;
            ball.y = pongH / 2;
            ball.vx = direction * (0.6 + Math.random() * 0.4);
            ball.vy = (Math.random() - 0.5) * 1.2;
        }

        function updatePong() {
            const now = performance.now();
            const dt = Math.min((now - lastTime) / 16.67, 2);
            lastTime = now;

            // Left paddle: user control when hovering, natural AI otherwise
            if (isHoveringPong) {
                if (keyUp) paddleL.y -= paddleSpeed * dt;
                if (keyDown) paddleL.y += paddleSpeed * dt;
            } else {
                // Smart predictive AI for left paddle
                aiL.reactionDelay -= dt;
                if (aiL.reactionDelay <= 0) {
                    aiL.targetY = predictBallY(paddleL.x + paddleL.w, aiL);
                    aiL.reactionDelay = 2 + Math.random() * 4;
                }
                const diff = aiL.targetY - (paddleL.y + paddleL.h / 2);
                const boostL = aiL.accuracyBoost || 1;
                const targetPos = paddleL.y + diff * 0.12 * boostL * dt;
                paddleL.y += (targetPos - paddleL.y) * 0.3 * boostL;
            }

            // Smart predictive AI for right paddle
            aiR.reactionDelay -= dt;
            if (aiR.reactionDelay <= 0) {
                aiR.targetY = predictBallY(paddleR.x, aiR);
                aiR.reactionDelay = 2 + Math.random() * 3;
            }
            const diffR = aiR.targetY - (paddleR.y + paddleR.h / 2);
            const boostR = aiR.accuracyBoost || 1;
            const targetPosR = paddleR.y + diffR * 0.15 * boostR * dt;
            paddleR.y += (targetPosR - paddleR.y) * 0.35 * boostR;

            // Predict where ball will be at paddle X position using real-time data
            function predictBallY(paddleX, ai) {
                // Always use current ball state for fresh prediction
                let predictX = ball.x;
                let predictY = ball.y;
                let predictVx = ball.vx;
                let predictVy = ball.vy;
                const maxBounces = 3; // Increased for better prediction
                let bounces = 0;

                // Add slight randomness based on accuracy boost (less boost = more error)
                const accuracy = ai.accuracyBoost || 1;
                const errorFactor = Math.max(0, 1.5 - accuracy) * 0.3;

                // Simulate ball trajectory
                while (bounces < maxBounces) {
                    const dx = paddleX - predictX;
                    if (dx * predictVx > 0) {
                        const t = dx / predictVx;
                        predictY += predictVy * t;

                        // Handle wall bounces in prediction
                        while (predictY < 0 || predictY > pongH) {
                            if (predictY < 0) {
                                predictY = -predictY;
                                predictVy = Math.abs(predictVy);
                            } else if (predictY > pongH) {
                                predictY = 2 * pongH - predictY;
                                predictVy = -Math.abs(predictVy);
                            }
                        }

                        // Add error based on accuracy (lower accuracy = more error)
                        const speed = Math.sqrt(predictVx * predictVx + predictVy * predictVy);
                        const baseError = (Math.random() - 0.5) * speed * (1 + errorFactor);
                        const targetOffset = (predictVy > 0 ? 1 : -1) * speed * 0.1 * errorFactor;
                        return predictY - paddleL.h / 2 + baseError + targetOffset;
                    }

                    // Predict wall bounce
                    if (predictVy > 0) {
                        const tToWall = (pongH - predictY) / predictVy;
                        predictX += predictVx * tToWall;
                        predictY = pongH;
                        predictVy = -predictVy;
                    } else {
                        const tToWall = -predictY / predictVy;
                        predictX += predictVx * tToWall;
                        predictY = 0;
                        predictVy = -predictVy;
                    }
                    bounces++;
                }

                return ball.y - paddleL.h / 2 + (Math.random() - 0.5) * 3;
            }

            // Clamp paddles
            paddleL.y = Math.max(0, Math.min(pongH - paddleL.h, paddleL.y));
            paddleR.y = Math.max(0, Math.min(pongH - paddleR.h, paddleR.y));

            // Move ball
            ball.x += ball.vx * dt;
            ball.y += ball.vy * dt;

            // Wall bounce (top/bottom)
            if (ball.y - ball.r < 0) {
                ball.y = ball.r;
                ball.vy = Math.abs(ball.vy);
            } else if (ball.y + ball.r > pongH) {
                ball.y = pongH - ball.r;
                ball.vy = -Math.abs(ball.vy);
            }

            // Paddle collisions (front face)
            const hitL = ball.x - ball.r < paddleL.x + paddleL.w && ball.x > paddleL.x &&
                         ball.y > paddleL.y && ball.y < paddleL.y + paddleL.h;
            const hitR = ball.x + ball.r > paddleR.x && ball.x < paddleR.x + paddleR.w &&
                         ball.y > paddleR.y && ball.y < paddleR.y + paddleR.h;

            // Calculate hit position relative to paddle center (-1 to 1, 0 is center)
            const hitOffsetL = hitL ? (ball.y - (paddleL.y + paddleL.h / 2)) / (paddleL.h / 2) : 0;
            const hitOffsetR = hitR ? (ball.y - (paddleR.y + paddleR.h / 2)) / (paddleR.h / 2) : 0;

            if (hitL && ball.vx < 0) {
                ball.vx = Math.abs(ball.vx) * 1.02;
                ball.x = paddleL.x + paddleL.w + ball.r;
                ball.vy += hitOffsetL * 0.05;

                // Reward AI for center hits (better prediction accuracy)
                const centerBonus = 1 - Math.abs(hitOffsetL);
                if (centerBonus > 0.7) {
                    aiL.accuracyBoost = Math.min(2, (aiL.accuracyBoost || 1) + 0.15);
                    aiL.rewardTimer = 60; // Show reward for 60 frames
                }
            }
            if (hitR && ball.vx > 0) {
                ball.vx = -Math.abs(ball.vx) * 1.02;
                ball.x = paddleR.x - ball.r;
                ball.vy += hitOffsetR * 0.05;

                // Reward AI for center hits
                const centerBonus = 1 - Math.abs(hitOffsetR);
                if (centerBonus > 0.7) {
                    aiR.accuracyBoost = Math.min(2, (aiR.accuracyBoost || 1) + 0.15);
                    aiR.rewardTimer = 60;
                }
            }

            // Decay accuracy boost over time
            aiL.accuracyBoost = (aiL.accuracyBoost || 1) * 0.998;
            aiR.accuracyBoost = (aiR.accuracyBoost || 1) * 0.998;
            if (aiL.accuracyBoost < 1) aiL.accuracyBoost = 1;
            if (aiR.accuracyBoost < 1) aiR.accuracyBoost = 1;

            // Decay reward timers
            if (aiL.rewardTimer > 0) aiL.rewardTimer--;
            if (aiR.rewardTimer > 0) aiR.rewardTimer--;

            // Cap velocity
            const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
            if (speed > 2) {
                ball.vx = (ball.vx / speed) * 2;
                ball.vy = (ball.vy / speed) * 2;
            }

            // Score / reset
            if (ball.x < -2) {
                scoreR++;
                resetBall(1);
            } else if (ball.x > pongW + 2) {
                scoreL++;
                resetBall(-1);
            }

            // Render
            pongCtx.fillStyle = '#111214';
            pongCtx.fillRect(0, 0, pongW, pongH);

            // Paddles with reward glow (red themed)
            const paddleGlowL = aiL.rewardTimer > 0 ? `rgba(255, 80, 80, ${aiL.rewardTimer / 40})` : null;
            const paddleGlowR = aiR.rewardTimer > 0 ? `rgba(255, 80, 80, ${aiR.rewardTimer / 40})` : null;

            if (paddleGlowL) {
                pongCtx.fillStyle = paddleGlowL;
                pongCtx.fillRect(paddleL.x - 1, paddleL.y - 1, paddleL.w + 2, paddleL.h + 2);
            }
            if (paddleGlowR) {
                pongCtx.fillStyle = paddleGlowR;
                pongCtx.fillRect(paddleR.x - 1, paddleR.y - 1, paddleR.w + 2, paddleR.h + 2);
            }

            pongCtx.fillStyle = '#ff3333';
            pongCtx.fillRect(paddleL.x, paddleL.y, paddleL.w, paddleL.h);
            pongCtx.fillRect(paddleR.x, paddleR.y, paddleR.w, paddleR.h);

            // Ball
            pongCtx.fillStyle = '#cc2222';
            pongCtx.fillRect(Math.floor(ball.x - ball.r), Math.floor(ball.y - ball.r), ball.r * 2 + 1, ball.r * 2 + 1);

            // Center line
            pongCtx.fillStyle = '#5c0e10';
            for (let y = 1; y < pongH; y += 4) {
                pongCtx.fillRect(pongW / 2 - 1, y, 2, 2);
            }

            requestAnimationFrame(updatePong);
        }
        resetBall(1);
        updatePong();

        // === BACKGROUND PARTICLES ===
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');

        function resizeBgCanvas() {
            bgCanvas.width = window.innerWidth;

        window.addEventListener('resize', resizeBgCanvas);

        const particles = [];
        const particleCount = 60;
        const bgColors = ['#ff3333', '#cc2222', '#8b1a1f', '#5c0e10'];

        let cursorX = bgCanvas.width / 2;
        let cursorY = bgCanvas.height / 2;
        let parallaxX = 0;
        let parallaxY = 0;

        for (let i = 0; i < particleCount; i++) {
            const isCube = Math.random() < 0.3; // 30% are cubes
            particles.push({
                x: Math.random() * bgCanvas.width,
                y: Math.random() * bgCanvas.height,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3 - 0.1,
                size: isCube ? Math.random() * 6 + 4 : Math.random() * 4 + 3,
                color: bgColors[Math.floor(Math.random() * bgColors.length)],
                alpha: Math.random() * 0.3 + 0.2,
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.03,
                pulse: Math.random() * Math.PI * 2,

                type: isCube ? 'cube' : 'triangle',
                rotX: Math.random() * Math.PI * 2,
                rotY: Math.random() * Math.PI * 2,
                rotSpeedX: (Math.random() - 0.5) * 0.02,
                rotSpeedY: (Math.random() - 0.5) * 0.02
            });
        }

        function drawTriangle(ctx, x, y, size, rotation, color, alpha) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotation);
            ctx.beginPath();
            ctx.moveTo(0, -size);
            ctx.lineTo(size * 0.866, size * 0.5);
            ctx.lineTo(-size * 0.866, size * 0.5);
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.globalAlpha = alpha;
            ctx.fill();
            ctx.restore();
        }

        function drawCube(ctx, x, y, size, rotX, rotY, color, alpha) {
            ctx.save();
            ctx.translate(x, y);
            ctx.globalAlpha = alpha;
            ctx.strokeStyle = color;
            ctx.lineWidth = 1;

            // 3D cube vertices
            const s = size;
            const vertices = [
                [-s, -s, -s], [s, -s, -s], [s, s, -s], [-s, s, -s], // back face
                [-s, -s, s], [s, -s, s], [s, s, s], [-s, s, s]       // front face
            ];

            // Rotation matrices
            const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
            const cosY = Math.cos(rotY), sinY = Math.sin(rotY);

            // Rotate and project vertices
            const projected = vertices.map(v => {
                // Rotate around X
                let y1 = v[1] * cosX - v[2] * sinX;
                let z1 = v[1] * sinX + v[2] * cosX;
                // Rotate around Y
                let x2 = v[0] * cosY - z1 * sinY;
                let z2 = v[0] * sinY + z1 * cosY;
                // Simple perspective
                const scale = 1 + z2 * 0.01;
                return [x2 * scale, y1 * scale];
            });

            // Draw edges
            const edges = [
                [0,1], [1,2], [2,3], [3,0], // back face
                [4,5], [5,6], [6,7], [7,4], // front face
                [0,4], [1,5], [2,6], [3,7]  // connecting edges
            ];

            ctx.beginPath();
            for (const [a, b] of edges) {
                ctx.moveTo(projected[a][0], projected[a][1]);
                ctx.lineTo(projected[b][0], projected[b][1]);
            }
            ctx.stroke();

            // Draw faint face fills for depth
            ctx.fillStyle = color;
            ctx.globalAlpha = alpha * 0.15;

            // Front face
            ctx.beginPath();
            ctx.moveTo(projected[4][0], projected[4][1]);
            ctx.lineTo(projected[5][0], projected[5][1]);
            ctx.lineTo(projected[6][0], projected[6][1]);
            ctx.lineTo(projected[7][0], projected[7][1]);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        // Track cursor for parallax
        document.addEventListener('mousemove', (e) => {

        function updateBgParticles() {
            bgCtx.fillStyle = '#0b0b0b';
            bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

            // Smooth parallax interpolation
            const targetParallaxX = (cursorX - bgCanvas.width / 2) * 0.1;
            const targetParallaxY = (cursorY - bgCanvas.height / 2) * 0.1;
            parallaxX += (targetParallaxX - parallaxX) * 0.1;
            parallaxY += (targetParallaxY - parallaxY) * 0.1;

            for (let p of particles) {
                p.x += p.vx;
                p.y += p.vy;
                p.rotation += p.rotSpeed;
                p.pulse += 0.02;

                // Update 3D cube rotations
                if (p.type === 'cube') {
                    p.rotX += p.rotSpeedX;
                    p.rotY += p.rotSpeedY;
                }

                // Wrap around screen
                if (p.x < -30) p.x = bgCanvas.width + 30;
                if (p.x > bgCanvas.width + 30) p.x = -30;
                if (p.y < -30) p.y = bgCanvas.height + 30;
                if (p.y > bgCanvas.height + 30) p.y = -30;

                // Apply parallax offset based on size (smaller = less movement, larger = more)
                const sizeFactor = (p.size - 3) / 7;
                const parallaxOffsetX = parallaxX * (0.3 + sizeFactor * 0.7);
                const parallaxOffsetY = parallaxY * (0.3 + sizeFactor * 0.7);

                const pulseAlpha = p.alpha + Math.sin(p.pulse) * 0.15;
                const finalAlpha = Math.max(0.1, Math.min(0.6, pulseAlpha));

                // Draw based on type
                if (p.type === 'cube') {
                    drawCube(bgCtx, p.x + parallaxOffsetX, p.y + parallaxOffsetY, p.size, p.rotX, p.rotY, p.color, finalAlpha);
                } else {
                    drawTriangle(bgCtx, p.x + parallaxOffsetX, p.y + parallaxOffsetY, p.size, p.rotation, p.color, finalAlpha);
                }
                bgCtx.globalAlpha = 1;

                // Draw faint connections between nearby particles (with parallax)
                for (let other of particles) {
                    if (p === other) continue;
                    const otherParallaxX = parallaxX * other.depth;
                    const otherParallaxY = parallaxY * other.depth;
                    const dx = (p.x + parallaxOffsetX) - (other.x + otherParallaxX);
                    const dy = (p.y + parallaxOffsetY) - (other.y + otherParallaxY);
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 100) {
                        bgCtx.beginPath();
                        bgCtx.moveTo(p.x + parallaxOffsetX, p.y + parallaxOffsetY);
                        bgCtx.lineTo(other.x + otherParallaxX, other.y + otherParallaxY);
                        bgCtx.strokeStyle = p.color;
                        bgCtx.globalAlpha = (1 - dist / 100) * 0.15;
                        bgCtx.lineWidth = 0.5;
                        bgCtx.stroke();
                        bgCtx.globalAlpha = 1;
                    }
                }
            }

            requestAnimationFrame(updateBgParticles);
        }
        updateBgParticles();

        // === MICROPHONE AUDIO VISUALIZER ===
        let audioContext = null;
        let analyser = null;
        let micStream = null;
        let isMicMode = false;
        let audioIntensity = 0;

        // Press 'M' to toggle microphone mode
        document.addEventListener('keydown', async (e) => {
            if (e.key.toLowerCase() === 'm' && e.ctrlKey) {
                e.preventDefault();
                await toggleMicMode();

        async function toggleMicMode() {
            if (!isMicMode) {
                try {
                    if (!audioContext) {
                        audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        analyser = audioContext.createAnalyser();
                        analyser.fftSize = 64;
                        analyser.smoothingTimeConstant = 0.8;
                    }

                    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const source = audioContext.createMediaStreamSource(micStream);
                    source.connect(analyser);
                    isMicMode = true;
                    console.log('Mic mode enabled - press Ctrl+M to disable');
                } catch (err) {
                    console.log('Mic access denied or not available');
                }
            } else {
                if (micStream) {
                    micStream.getTracks().forEach(track => track.stop());
                    micStream = null;
                }
                isMicMode = false;
                audioIntensity = 0;
                console.log('Mic mode disabled');
            }
        }

        function getAudioData() {
            if (!isMicMode || !analyser) return null;

            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);

            // Calculate average intensity for particle effects
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            const avg = sum / dataArray.length;
            audioIntensity = avg / 255; // 0 to 1

            return dataArray;
        }

        // Hook into visualizer to use mic data
        const originalUpdateVisualizer = updateVisualizer;
        updateVisualizer = function() {
            const micData = getAudioData();

            if (micData && isMicMode) {
                // Use mic data instead of synthetic audio
                const dataLength = micData.length;
                for (let i = 0; i < barCount; i++) {
                    const dataIndex = Math.floor(i * (dataLength / barCount));
                    const value = micData[dataIndex] / 255;
                    barTargets[i] = Math.max(0.02, value * 1.2);
                    barValues[i] += (barTargets[i] - barValues[i]) * 0.3;
                }

                vizTime += 1 / 60;
            } else {
                // Fall back to original Bad Apple pattern
                return originalUpdateVisualizer();
            }

            // Render visualizer
            vizCtx.fillStyle = isMonochrome ? '#000000' : '#111214';
            vizCtx.fillRect(0, 0, vizW, vizH);

            const barW = (vizW - (barCount + 1) * 2) / barCount;
            for (let i = 0; i < barCount; i++) {
                const x = 2 + i * (barW + 2);
                const h = barValues[i] * (vizH - 20);
                const y = vizH - 10 - h;

                const grad = vizCtx.createLinearGradient(x, y, x, vizH - 10);
                if (isMonochrome) {
                    grad.addColorStop(0, '#ffffff');
                    grad.addColorStop(0.5, '#888888');
                    grad.addColorStop(1, '#333333');
                } else {
                    grad.addColorStop(0, '#ff3333');
                    grad.addColorStop(0.5, '#cc2222');
                    grad.addColorStop(1, '#5c0e10');
                }
                vizCtx.fillStyle = grad;
                vizCtx.fillRect(x, y, barW, h);

                vizCtx.fillStyle = isMonochrome ? 'rgba(255,255,255,0.3)' : 'rgba(255, 51, 51, 0.3)';
                vizCtx.fillRect(x, y - 3, barW, 2);
            }

            requestAnimationFrame(updateVisualizer);
        };

        // === MOBILE DETECTION ===
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        if (isMobile) {
            // Disable custom cursor on mobile
            const cursorCanvas = document.getElementById('cursor-canvas');
            if (cursorCanvas) cursorCanvas.style.display = 'none';
            document.body.style.cursor = 'auto';

            // Disable audio features that may cause issues
            console.log('Mobile detected - cursor disabled');
        }

        // === PARTICLE AUDIO REACTIVITY ===
        // Hook into background particle system
        const originalUpdateBgParticles = updateBgParticles;
        updateBgParticles = function() {
            // Get audio intensity for particle pulsing
            if (isMicMode) {
                getAudioData(); // Updates audioIntensity
            } else {
                // Use visualizer data when not in mic mode
                let vizSum = 0;
                for (let i = 0; i < barCount; i++) {
                    vizSum += barValues[i];
                }
                audioIntensity = (vizSum / barCount) * 0.8;
            }

            return originalUpdateBgParticles();
        };

        // Modify particle drawing to include pulse effect
        const originalDrawTriangle = drawTriangle;
        drawTriangle = function(ctx, x, y, size, rotation, color, alpha) {
            // Pulse size with audio
            const pulseSize = size * (1 + audioIntensity * 0.5);
            return originalDrawTriangle(ctx, x, y, pulseSize, rotation, color, alpha);
        };

        const originalDrawCube = drawCube;
        drawCube = function(ctx, x, y, size, rotX, rotY, color, alpha) {
            // Pulse size with audio and increase rotation speed
            const pulseSize = size * (1 + audioIntensity * 0.6);
            const audioRotX = rotX + audioIntensity * 0.1;
            const audioRotY = rotY + audioIntensity * 0.1;
            return originalDrawCube(ctx, x, y, pulseSize, audioRotX, audioRotY, color, alpha);
        };
    </script>
